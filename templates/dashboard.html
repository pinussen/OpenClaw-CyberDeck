<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberDeck Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00ff88;
        }
        
        .logo {
            font-size: 2em;
            color: #00ff88;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .logo:hover { opacity: 0.8; }
        
        h1 { color: #00ff88; font-size: 1.8em; margin-left: 20px; }
        
        .links { display: flex; gap: 10px; }
        
        .btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover { opacity: 0.9; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-num { font-size: 2em; font-weight: bold; color: #00ff88; }
        .stat-label { font-size: 0.85em; color: #888; margin-top: 5px; }
        
        .section-title {
            color: #00ff88;
            margin: 20px 0 10px;
            font-size: 1.2em;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        
        .issues-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .issue-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .issue-item:hover {
            background: rgba(0,255,136,0.1);
            border-color: #00ff88;
        }
        
        .issue-left { flex: 1; }
        
        .issue-key {
            background: #00ff88;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85em;
            display: inline-block;
            margin-right: 8px;
        }
        
        .issue-title { font-size: 0.95em; color: #fff; }
        
        .issue-meta {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            font-size: 0.85em;
            color: #888;
        }
        
        .badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75em;
        }
        
        .badge-status {
            text-transform: uppercase;
        }
        .badge-todo { background: #ff4444; color: #fff; }
        .badge-in_progress { background: #00aa88; color: #fff; }
        .badge-blocked { background: #ff8800; color: #fff; }
        .badge-done { background: #4caf50; color: #fff; }
        .badge-cancelled { background: #9e9e9e; color: #fff; }
        
        .badge-priority {
            font-weight: bold;
        }
        .badge-high { background: #ff4444; color: #fff; }
        .badge-medium { background: #ffaa00; color: #000; }
        .badge-low { background: #00ff88; color: #000; }
        
        .assignee {
            color: #00ff88;
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 8px;
            margin-left: 15px;
        }
        
        .action-link {
            color: #00ff88;
            text-decoration: none;
            padding: 4px 8px;
            border: 1px solid #00ff88;
            border-radius: 4px;
            font-size: 0.8em;
        }
        
        .action-link:hover {
            background: #00ff88;
            color: #000;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .summary-box {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .summary-box h3 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .summary-box ul {
            list-style: none;
            padding: 0;
        }
        
        .summary-box li {
            padding: 5px 0;
            border-bottom: 1px solid rgba(0,255,136,0.2);
        }
        
        .summary-box li:last-child { border-bottom: none; }
        
        .parent-row {
            cursor: pointer;
            position: relative;
        }
        
        .parent-row:hover {
            background: rgba(255,255,255,0.02);
        }
        
        .expand-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: rgba(0,255,136,0.2);
            border: 1px solid #00ff88;
            border-radius: 4px;
            color: #00ff88;
            font-size: 12px;
            margin-right: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .expand-btn:hover {
            background: rgba(0,255,136,0.4);
        }
        
        .expand-btn.collapsed::after {
            content: "▶";
        }
        
        .expand-btn.expanded::after {
            content: "▼";
        }
        
        .child-row {
            display: none;
            margin-left: 30px;
            border-left: 3px solid #00ff88;
            padding-left: 15px;
            animation: slideDown 0.3s ease;
        }
        
        .child-row.visible {
            display: block;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .child-count {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 8px;
        }
        
        .due-date {
            background: rgba(255,100,100,0.2);
            color: #ff6464;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 8px;
        }
        
        .due-soon {
            background: rgba(255,165,0,0.2);
            color: #ffa500;
        }
        
        .due-far {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="logo">🦾</a>
            <h1>CyberDeck Dashboard</h1>
            <div class="links">
                <a href="/issues" class="btn">Issues Manager ↗</a>
            </div>
        </div>
        
        <div class="summary-box">
            <h3>📊 Öppna Ärenden</h3>
            <div id="openCount" style="font-size: 2em; color: #00ff88; font-weight: bold;">Laddar...</div>
        </div>
        
        <h2 class="section-title">📋 Senaste Öppna Ärenden</h2>
        <div class="issues-list" id="issues">
            <div class="empty-state">Laddar...</div>
        </div>
    </div>
    
    <script>
        async function loadDashboard() {
            try {
                const res = await fetch('/api/dashboard/summary');
                const data = await res.json();
                
                if (data.ok) {
                    document.getElementById('openCount').textContent = data.summary.total_issues + ' öppna';
                    renderIssues(data.recent_issues || []);
                }
            } catch (error) {
                document.getElementById('issues').innerHTML = '<div class="empty-state">❌ Error: ' + error.message + '</div>';
            }
        }
        
        function renderIssues(issues) {
            const container = document.getElementById('issues');
            
            if (issues.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Inga öppna ärenden</div>';
                return;
            }
            
            // Sort issues: overdue first, then by due date, then priority
            issues.sort((a, b) => {
                // Priority sort first
                const priorityOrder = {high: 0, medium: 1, low: 2};
                const pDiff = (priorityOrder[a.priority] || 3) - (priorityOrder[b.priority] || 3);
                if (pDiff !== 0) return pDiff;
                
                // Then due date (null dates last)
                if (a.due_at && !b.due_at) return -1;
                if (!a.due_at && b.due_at) return 1;
                if (a.due_at && b.due_at) {
                    return new Date(a.due_at) - new Date(b.due_at);
                }
                return 0;
            });
            
            // Build sorted list maintaining sort order
            const sortedIssues = [...issues]; // Already sorted above
            const processedParents = new Set();
            
            let html = '';
            
            // Render in sorted order, but group children under parents
            sortedIssues.forEach(issue => {
                if (issue.parent_key) {
                    // Child issue - skip here, will be rendered under parent
                    return;
                }
                
                // Parent or standalone issue
                if (!processedParents.has(issue.key)) {
                    processedParents.add(issue.key);
                    const childIssues = sortedIssues.filter(c => c.parent_key === issue.key);
                    html += renderParentWithChildren(issue, childIssues);
                }
            });
            
            // Render orphaned children (children whose parent isn't in the list or is closed)
            const orphanedChildren = sortedIssues.filter(c => c.parent_key && !processedParents.has(c.parent_key));
            if (orphanedChildren.length > 0) {
                if (processedParents.size > 0) html += '<div style="margin: 15px 0; border-bottom: 1px dashed #333;"></div>';
                orphanedChildren.forEach(child => {
                    html += renderIssueItem(child, false, false);
                });
            }
            
            container.innerHTML = html;
            
            // Add click handlers
            document.querySelectorAll('.parent-row').forEach(el => {
                el.addEventListener('click', toggleChildren);
            });
        }
        
        function renderParentWithChildren(parent, children) {
            const hasChildren = children.length > 0;
            const childCount = hasChildren ? `<span class="child-count">${children.length}</span>` : '';
            const expandBtn = hasChildren ? '<span class="expand-btn collapsed" data-parent="' + parent.key + '"></span>' : '';
            
            let html = renderIssueItem(parent, false, true, expandBtn, childCount);
            
            children.forEach(child => {
                html += renderIssueItem(child, true, false, '', '', parent.key);
            });
            
            return html;
        }
        
        function toggleChildren(e) {
            const parentKey = e.currentTarget.dataset.key;
            const btn = e.currentTarget.querySelector('.expand-btn');
            const children = document.querySelectorAll('.child-of-' + parentKey);
            
            if (btn) {
                btn.classList.toggle('collapsed');
                btn.classList.toggle('expanded');
            }
            
            children.forEach(child => {
                child.classList.toggle('visible');
            });
        }
        
        function renderIssueItem(issue, isChild, isParent, expandBtn = '', childCount = '', parentKey = '') {
            const childClass = isChild ? 'child-row child-of-' + parentKey : '';
            const parentClass = isParent ? 'parent-row' : '';
            const parentData = isParent ? 'data-key="' + issue.key + '"' : '';
            const parentBadge = isChild ? '<span class="badge" style="background: #00ff88; color: #000;">📎 Underärende</span>' : '';
            
            // Format due date
            let dueBadge = '';
            if (issue.due_at) {
                const due = new Date(issue.due_at);
                const now = new Date();
                const daysUntil = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
                const dueClass = daysUntil < 0 ? '' : (daysUntil <= 3 ? 'due-soon' : 'due-far');
                const dueText = daysUntil < 0 ? 'ÖVERDUE' : (daysUntil === 0 ? 'IDAG' : daysUntil + 'd');
                dueBadge = `<span class="due-date ${dueClass}">📅 ${due.toLocaleDateString('sv-SE')} (${dueText})</span>`;
            }
            
            return `
                <div class="issue-item ${parentClass} ${childClass}" ${parentData} style="${isChild ? '' : ''}">
                    <div class="issue-left">
                        ${expandBtn}
                        <span class="issue-key">${issue.key}</span>
                        ${childCount}
                        ${parentBadge}
                        ${dueBadge}
                        <div class="issue-title">${escapeHtml(issue.title)}</div>
                        <div class="issue-meta">
                            <span class="badge badge-status badge-${issue.status}">${issue.status}</span>
                            <span class="badge badge-priority badge-${issue.priority}">${issue.priority}</span>
                            ${issue.assignee ? `<span class="assignee">🤖 @${issue.assignee}</span>` : ''}
                            ${issue.labels?.length ? `<span>${issue.labels.slice(0,3).join(', ')}</span>` : ''}
                        </div>
                    </div>
                    <div class="actions">
                        <a href="/issues/${issue.key}/edit" class="action-link">✏️ Redigera</a>
                        <a href="/issues#${issue.key}" class="action-link">Öppna</a>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
