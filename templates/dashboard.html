<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberDeck Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #00ff88;
        }
        
        .logo {
            font-size: 2em;
            color: #00ff88;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .logo:hover { opacity: 0.8; }
        
        h1 { color: #00ff88; font-size: 1.8em; margin-left: 20px; }
        
        .links { display: flex; gap: 10px; }
        
        .btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover { opacity: 0.9; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-num { font-size: 2em; font-weight: bold; color: #00ff88; }
        .stat-label { font-size: 0.85em; color: #888; margin-top: 5px; }
        
        .section-title {
            color: #00ff88;
            margin: 20px 0 10px;
            font-size: 1.2em;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        
        .issues-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .issue-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .issue-item:hover {
            background: rgba(0,255,136,0.1);
            border-color: #00ff88;
        }
        
        .issue-left { flex: 1; }
        
        .issue-key {
            background: #00ff88;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.85em;
            display: inline-block;
            margin-right: 8px;
        }
        
        .issue-title { font-size: 0.95em; color: #fff; }
        
        .issue-meta {
            display: flex;
            gap: 10px;
            margin-top: 5px;
            font-size: 0.85em;
            color: #888;
        }
        
        .badge {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.75em;
        }
        
        .badge-status {
            text-transform: uppercase;
        }
        .badge-todo { background: #ff4444; color: #fff; }
        .badge-in_progress { background: #00aa88; color: #fff; }
        .badge-blocked { background: #ff8800; color: #fff; }
        .badge-done { background: #4caf50; color: #fff; }
        .badge-cancelled { background: #9e9e9e; color: #fff; }
        
        .badge-priority {
            font-weight: bold;
        }
        .badge-high { background: #ff4444; color: #fff; }
        .badge-medium { background: #ffaa00; color: #000; }
        .badge-low { background: #00ff88; color: #000; }
        
        .assignee {
            color: #00ff88;
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 8px;
            margin-left: 15px;
        }
        
        .action-link {
            color: #00ff88;
            text-decoration: none;
            padding: 4px 8px;
            border: 1px solid #00ff88;
            border-radius: 4px;
            font-size: 0.8em;
        }
        
        .action-link:hover {
            background: #00ff88;
            color: #000;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .summary-box {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .summary-box h3 {
            color: #00ff88;
            margin-bottom: 10px;
        }
        
        .summary-box ul {
            list-style: none;
            padding: 0;
        }
        
        .summary-box li {
            padding: 5px 0;
            border-bottom: 1px solid rgba(0,255,136,0.2);
        }
        
        .summary-box li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="logo">🦾</a>
            <h1>CyberDeck Dashboard</h1>
            <div class="links">
                <a href="/issues" class="btn">Issues Manager ↗</a>
            </div>
        </div>
        
        <div class="summary-box">
            <h3>📊 Öppna Ärenden</h3>
            <div id="openCount" style="font-size: 2em; color: #00ff88; font-weight: bold;">Laddar...</div>
        </div>
        
        <h2 class="section-title">📋 Senaste Öppna Ärenden</h2>
        <div class="issues-list" id="issues">
            <div class="empty-state">Laddar...</div>
        </div>
    </div>
    
    <script>
        async function loadDashboard() {
            try {
                const res = await fetch('/api/dashboard/summary');
                const data = await res.json();
                
                if (data.ok) {
                    document.getElementById('openCount').textContent = data.summary.total_issues + ' öppna';
                    renderIssues(data.recent_issues || []);
                }
            } catch (error) {
                document.getElementById('issues').innerHTML = '<div class="empty-state">❌ Error: ' + error.message + '</div>';
            }
        }
        
        function renderIssues(issues) {
            const container = document.getElementById('issues');
            
            if (issues.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Inga öppna ärenden</div>';
                return;
            }
            
            // Build parent-child map
            const parents = issues.filter(i => !i.parent_key);
            const children = issues.filter(i => i.parent_key);
            
            let html = '';
            
            // Render parents first
            parents.forEach(issue => {
                html += renderIssueItem(issue, false);
                
                // Find and render children under this parent
                const childIssues = children.filter(c => c.parent_key === issue.key);
                childIssues.forEach(child => {
                    html += renderIssueItem(child, true);
                });
            });
            
            // Render orphaned children (children whose parent isn't in the list)
            const orphanedChildren = children.filter(c => !parents.find(p => p.key === c.parent_key));
            if (orphanedChildren.length > 0) {
                if (parents.length > 0) html += '<div style="margin: 15px 0; border-bottom: 1px dashed #333;"></div>';
                orphanedChildren.forEach(child => {
                    html += renderIssueItem(child, false);
                });
            }
            
            container.innerHTML = html;
        }
        
        function renderIssueItem(issue, isChild) {
            const indent = isChild ? 'margin-left: 30px; border-left: 3px solid #00ff88; padding-left: 15px;' : '';
            const parentBadge = isChild ? '<span class="badge" style="background: #00ff88; color: #000;">📎 Underärende</span>' : '';
            
            return `
                <div class="issue-item" style="${indent}">
                    <div class="issue-left">
                        <span class="issue-key">${issue.key}</span>
                        ${parentBadge}
                        <div class="issue-title">${escapeHtml(issue.title)}</div>
                        <div class="issue-meta">
                            <span class="badge badge-status badge-${issue.status}">${issue.status}</span>
                            <span class="badge badge-priority badge-${issue.priority}">${issue.priority}</span>
                            ${issue.assignee ? `<span class="assignee">🤖 @${issue.assignee}</span>` : ''}
                            ${issue.labels?.length ? `<span>${issue.labels.slice(0,3).join(', ')}</span>` : ''}
                        </div>
                    </div>
                    <div class="actions">
                        <a href="/issues/${issue.key}/edit" class="action-link">✏️ Redigera</a>
                        <a href="/issues#${issue.key}" class="action-link">Öppna</a>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
