<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberDeck - OpenClaw</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-bottom: 2px solid #00ff88;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .logo-home {
            font-size: 2em;
            color: #00ff88;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 5px;
            transition: transform 0.2s;
        }
        
        .logo-home:hover {
            transform: scale(1.1);
        }
        
        .logo span { color: #00ff88; }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected { background: #00ff88; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        .feed-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 20px;
        }
        
        .feed-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .feed-header h2 { color: #00ff88; }
        
        .feed-header .btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .activity {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid #00ff88;
            padding: 12px;
            border-radius: 5px;
        }
        
        .activity.error { border-left-color: #ff4444; }
        .activity.success { border-left-color: #00ff88; }
        .activity.info { border-left-color: #00aa88; }
        
        .activity-title { font-weight: bold; color: #fff; margin-bottom: 5px; }
        .activity-detail { font-size: 0.9em; color: #888; }
        .activity-time { font-size: 0.8em; color: #666; margin-top: 5px; }
        
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,255,136,0.3);
            border-radius: 10px;
            padding: 15px;
        }
        
        .panel h3 {
            color: #00ff88;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid rgba(0,255,136,0.3);
        }
        
        .queue-stats {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .queue-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        
        .queue-count {
            font-weight: bold;
            color: #00ff88;
        }
        
        .recent-issues {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .recent-issue {
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            transition: background 0.2s;
        }
        
        .recent-issue:hover {
            background: rgba(0,255,136,0.1);
        }
        
        .recent-issue-key {
            background: #00ff88;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 0.8em;
            display: inline-block;
            margin-right: 8px;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .input-container input {
            flex: 1;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,255,136,0.5);
            border-radius: 5px;
            color: #fff;
            font-family: inherit;
        }
        
        .input-container input:focus {
            outline: none;
            border-color: #00ff88;
        }
        
        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            background: rgba(0,255,136,0.2);
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            border: 1px solid rgba(0,255,136,0.5);
        }
        
        .nav-links a:hover {
            background: rgba(0,255,136,0.3);
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        @media (max-width: 900px) {
            .main { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <a href="/" class="logo-home">🦾</a>
            <span>CyberDeck</span>
        </div>
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>
    
    <div class="main">
        <div class="feed-container">
            <div class="feed-header">
                <h2>📋 Activity Feed</h2>
                <button class="btn" onclick="clearFeed()">🗑️ Clear</button>
            </div>
            
            <div class="nav-links">
                <a href="/issues">🦾 Issues Manager</a>
                <a href="/dashboard">📊 Dashboard</a>
                <a href="/api/activities">🔌 API</a>
            </div>
            
            <div class="activity-list" id="activityList">
                <div class="empty-state">📭 No activities yet</div>
            </div>
            
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">➤ Send</button>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="panel">
                <h3>📊 Queue Status</h3>
                <div class="queue-stats" id="queueStats">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
            
            <div class="panel">
                <h3>📌 Recent Issues</h3>
                <div class="recent-issues" id="recentIssues">
                    <div class="empty-state">Loading...</div>
                </div>
            </div>
            
            <div class="panel">
                <h3>🤖 Agent Status</h3>
                <div id="agentStatus" style="color: #888; font-size: 0.9em;">
                    Waiting for agent status...
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        
        // Connect on load
        socket.on('connect', () => {
            console.log('Connected to server');
            document.getElementById('statusDot').classList.add('connected');
            document.getElementById('statusText').textContent = 'Connected';
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected');
            document.getElementById('statusDot').classList.remove('connected');
            document.getElementById('statusText').textContent = 'Disconnected';
        });
        
        socket.on('activities', (activities) => {
            renderActivities(activities);
        });
        
        socket.on('status', (status) => {
            document.getElementById('statusText').textContent = status.status || 'Unknown';
        });
        
        socket.on('error', (data) => {
            console.error('Error:', data);
            addActivity('error', 'Error', data.message);
        });
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            socket.emit('send_message', { text });
            input.value = '';
        }
        
        function clearFeed() {
            socket.emit('command', { command: 'clear' });
        }
        
        function addActivity(type, title, detail = '', status = 'done') {
            socket.emit('activity', { type, title, detail, status });
        }
        
        function renderActivities(activities) {
            const container = document.getElementById('activityList');
            
            if (activities.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No activities yet</div>';
                return;
            }
            
            container.innerHTML = activities.map(act => `
                <div class="activity ${act.status}">
                    <div class="activity-title">${act.title}</div>
                    <div class="activity-detail">${act.detail || 'No details'}</div>
                    <div class="activity-time">${new Date(act.timestamp).toLocaleString('sv-SE')}</div>
                </div>
            `).join('');
        }
        
        async function loadQueue() {
            try {
                const res = await fetch('/api/queue');
                const data = await res.json();
                
                if (data.ok) {
                    const statsContainer = document.getElementById('queueStats');
                    if (Object.keys(data.queue).length === 0) {
                        statsContainer.innerHTML = '<div class="empty-state">📭 Empty queue</div>';
                    } else {
                        statsContainer.innerHTML = Object.entries(data.queue).map(([status, count]) => `
                            <div class="queue-item">
                                <span>${status}</span>
                                <span class="queue-count">${count}</span>
                            </div>
                        `).join('');
                    }
                    
                    // Recent issues - click to go to /issues#key
                    const issuesContainer = document.getElementById('recentIssues');
                    if ((data.recent || []).length === 0) {
                        issuesContainer.innerHTML = '<div class="empty-state">📭 No recent issues</div>';
                    } else {
                        issuesContainer.innerHTML = data.recent.slice(0, 5).map(issue => `
                            <a href="/issues#${issue.key}" class="recent-issue" title="Click to view ${issue.key}">
                                <span class="recent-issue-key">${issue.key}</span>
                                <span style="color: #fff;">${escapeHtml(issue.title)}</span>
                                <div style="font-size: 0.8em; color: #888; margin-top: 3px;">
                                    ${issue.status} • ${issue.priority}
                                </div>
                            </a>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading queue:', error);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Load on init
        document.addEventListener('DOMContentLoaded', () => {
            loadQueue();
            // Refresh every 30 seconds
            setInterval(loadQueue, 30000);
        });
    </script>
</body>
</html>
