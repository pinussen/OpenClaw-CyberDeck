        async function editComment(eventId) {
            const newComment = prompt('Skriv ny kommentar:');
            if (!newComment || newComment.trim() === '') return;
            
            try {
                const res = await fetch('/api/issues/${issueKey}/comment/' + eventId + '/edit', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ comment: newComment.trim() })
                });
                
                const data = await res.json();
                
                if (data.ok) {
                    showSuccess('Kommentar uppdaterad!');
                    setTimeout(() => loadIssue(), 500);
                } else {
                    showError('Error: ' + data.error);
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }
        
        async function deleteComment(eventId) {

                    showError('Error: ' + data.error);

        }
